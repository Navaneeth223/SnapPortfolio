version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: snapportfolio-mongo
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: snapportfolio
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: snapportfolio-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: snapportfolio-backend
    restart: always
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/snapportfolio
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  mongo-data:
  redis-data:
